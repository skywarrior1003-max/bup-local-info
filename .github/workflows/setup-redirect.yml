name: Setup bupai.net Redirect

on:
  workflow_dispatch:

jobs:
  setup-redirect:
    runs-on: ubuntu-latest
    steps:
      - name: Get bupai.net Zone ID
        id: zone
        run: |
          ZONE_ID=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones?name=bupai.net" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" | jq -r '.result[0].id')
          echo "ZONE_ID=$ZONE_ID" >> $GITHUB_ENV
          echo "Zone ID: $ZONE_ID"

      - name: Create DNS A record for bupai.net (proxied)
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"type":"A","name":"@","content":"192.0.2.1","ttl":1,"proxied":true}' | jq .

      - name: Create DNS A record for www.bupai.net (proxied)
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"type":"A","name":"www","content":"192.0.2.1","ttl":1,"proxied":true}' | jq .

      - name: Setup Redirect Rule (bupai.net → bupplatform.com)
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/rulesets" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{
              "name": "Redirect bupai.net to bupplatform.com",
              "kind": "zone",
              "phase": "http_request_dynamic_redirect",
              "rules": [
                {
                  "action": "redirect",
                  "action_parameters": {
                    "from_value": {
                      "target_url": {
                        "expression": "concat(\"https://bupplatform.com\", http.request.uri.path)"
                      },
                      "status_code": 301,
                      "preserve_query_string": true
                    }
                  },
                  "expression": "(http.host eq \"bupai.net\" or http.host eq \"www.bupai.net\")",
                  "description": "bupai.net → bupplatform.com 301 redirect",
                  "enabled": true
                }
              ]
            }' | jq .
